
services:
  web:
    build: .
    command: > 
      sh -c  "python manage.py collectstatic --noinput  && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8080:8000"
    env_file:
      - docker.env
    environment:
      - DEBUG=0

    volumes:
      - ./media:/core/media
      - ./staticfiles:/core/staticfiles
    
    restart: unless-stopped