# Set as the Run Command in Koyeb dashboard:
#   gunicorn tiriji.wsgi:application -c gunicorn.conf.py

# Socket
bind    = "0.0.0.0:8000"
backlog = 64

# Workers
workers      = 1
worker_class = "gthread"
threads      = 4   

# Timeouts
timeout          = 120
keepalive        = 5
graceful_timeout = 30

# Logging
accesslog = "-"
errorlog  = "-"
loglevel  = "warning"   

# Memory leak prevention — recycle worker after 1000 requests
max_requests        = 1000
max_requests_jitter = 100

# Process name (visible in Koyeb metrics)
proc_name = "tiriji"